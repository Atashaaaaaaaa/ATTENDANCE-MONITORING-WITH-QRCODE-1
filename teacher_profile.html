<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Profile - AMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <div class="sidebar">
        <h3>AMS System</h3>
        <a href="teacher_profile.html" class="active">Profile</a> 
        <a href="teacher_dashboard.html">Class Attendance</a>
        <a href="teacher_schedule.html">Class Schedule</a>
        <a href="teacher_reports.html">Reports</a>
        <a href="index.html">Logout</a>
    </div>

    <div class="main-content">
        <h1>Teacher Profile</h1>

        <div class="card" style="display: flex; align-items: center; gap: 30px;">
            <div style="width: 100px; height: 100px; background: #27ae60; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: white; font-weight: bold;">
                T
            </div>
            <div>
                <h2 style="margin: 0;">Teacher Name</h2> <p style="color: var(--primary-color); font-weight: bold; margin: 5px 0;">Faculty Member</p>
                <p style="color: var(--secondary-color); margin: 0;">Employee ID: 2026-TCH-001</p>
            </div>
        </div>

        <div class="card">
            <h3>Employment Details</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="font-weight: bold; color: #555;">Department</label>
                    <p style="margin-top: 5px;">Computer Studies / ICT</p>
                </div>
                <div>
                    <label style="font-weight: bold; color: #555;">Official Email</label>
                    <p style="margin-top: 5px;">teacher.email@dlsu.edu.ph</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Account Settings</h3>
            <form id="teacherProfileForm">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Update Password</label>
                    <input type="password" placeholder="Enter new password" style="width: 100%; max-width: 400px;">
                </div>
                <button type="submit" class="btn-success">Update Account</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('teacherProfileForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Security settings updated!");
        };
    </script>
</body>
</html>
