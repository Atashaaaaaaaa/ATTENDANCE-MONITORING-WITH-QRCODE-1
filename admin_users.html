<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management - AMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <div class="sidebar">
        <h3>AMS Admin</h3>
        <a href="admin_profile.html">Profile</a> 
        <a href="admin_overview.html">System Overview</a>
        <a href="admin_users.html" class="active">User Management</a>
        <a href="admin_mapping.html">Section Mapping</a>
        <a href="index.html">Logout</a>
    </div>

    <div class="main-content">
        <h1>User Management</h1>
        <p>Register and manage students, teachers, and staff members.</p>

        <div class="card">
            <h3>Register New User</h3>
            <form id="addUserForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="grid-column: span 1;">
                    <label style="display: block; margin-bottom: 5px;">Full Name</label>
                    <input type="text" placeholder="e.g. Mica Smith" required>
                </div>
                <div style="grid-column: span 1;">
                    <label style="display: block; margin-bottom: 5px;">Email Address</label>
                    <input type="email" placeholder="email@dlsu.edu.ph" required>
                </div>
                <div style="grid-column: span 1;">
                    <label style="display: block; margin-bottom: 5px;">Role</label>
                    <select required>
                        <option value="" disabled selected>Select User Role</option>
                        <option value="teacher">Teacher</option>
                        <option value="student">Student</option>
                    </select>
                </div>
                <div style="grid-column: span 1;">
                    <label style="display: block; margin-bottom: 5px;">Section/Department</label>
                    <input type="text" placeholder="e.g. G12-ICT">
                </div>
                <div style="grid-column: span 2;">
                    <button type="submit" style="width: 200px;">Register User</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3>Existing Profiles</h3>
                <input type="text" placeholder="Search by name or ID..." style="width: 250px; padding: 8px;">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2026-T-001</td>
                        <td>John Doe</td>
                        <td>Teacher</td>
                        <td><span style="color: var(--success-color);">Active</span></td>
                        <td>
                            <button class="btn-small btn-success">Edit</button>
                            <button class="btn-small btn-danger">Delete</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2026-S-088</td>
                        <td>Student A</td>
                        <td>Student</td>
                        <td><span style="color: var(--success-color);">Active</span></td>
                        <td>
                            <button class="btn-small btn-success">Edit</button>
                            <button class="btn-small btn-danger">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('addUserForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Success: User registered in the system!");
        };
    </script>
</body>
</html>
